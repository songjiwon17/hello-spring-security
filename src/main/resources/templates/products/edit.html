<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/templates/products}">상품 목록</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <h4 class="fw-bold mb-4 border-start border-4 border-primary ps-2">상품 수정</h4>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">상품명</label>
                    <input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">가격 (원)</label>
                    <input type="number" class="form-control" th:field="*{price}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">재고수량</label>
                    <input type="number" class="form-control" th:field="*{stock}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{stock}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">상품 설명</label>
                    <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/templates/products}" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>

<hr class="mt-5">
<footer style="text-align: center; color: #666; padding: 20px;">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371488 | 성명: 송지원'}"></p>
</footer>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 목록 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .table thead { background: #0f3460; color: #fff; }
        .table tbody tr:hover { background-color: #f0f4ff; }
        .badge-stock-high { background-color: #22c55e; }
        .badge-stock-low { background-color: #f59e0b; }
        .badge-stock-out { background-color: #ef4444; }
        .product-price { font-weight: 700; color: #e94560; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="page-header">
            <h4 class="fw-bold mb-0">상품 목록</h4>
            <small class="text-muted">
                총 <span th:text="${productPage.totalElements}"></span>개 상품
                (페이지 <span th:text="${productPage.number + 1}"></span> / <span th:text="${productPage.totalPages == 0 ? 1 : productPage.totalPages}"></span>)
            </small>
        </div>
        <a th:href="@{/products/add}" class="btn btn-danger btn-sm px-4 fw-semibold"
           sec:authorize="hasRole('ADMIN')">+ 상품 등록</a>
    </div>
    <div class="card mb-3 border-0 shadow-sm">
        <div class="card-body py-2">
            <form th:action="@{/products}" method="get" class="row g-2 align-items-center">
                <div class="col">
                    <input type="text" name="keyword" class="form-control" placeholder="상품명으로 검색" th:value="${keyword}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary px-4">검색</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary px-3">초기화</a>
                </div>
            </form>
        </div>
    </div>
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-0">
            <div th:if="${productPage.isEmpty()}" class="text-center py-5 text-muted">
                <p class="mb-0">등록된 상품이 없습니다.</p>
            </div>
            <div th:unless="${productPage.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width:60px">#</th>
                        <th>상품명</th>
                        <th>설명</th>
                        <th class="text-end">가격</th>
                        <th class="text-center">재고</th>
                        <th class="text-center">등록일</th>
                        <th class="text-center" sec:authorize="hasRole('ADMIN')">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productPage}">
                        <td class="ps-4 text-muted small" th:text="${p.id}"></td>
                        <td>
                            <a th:href="@{/products/{id}(id=${p.id})}"
                               class="text-decoration-none fw-semibold text-dark"
                               th:text="${p.name}"></a>
                        </td>
                        <td class="text-muted small" th:text="${p.description}"></td>
                        <td class="text-end product-price"
                            th:text="${#numbers.formatInteger(p.price, 1, 'COMMA') + '원'}"></td>
                        <td class="text-center">
                            <span th:if="${p.stock > 10}" class="badge badge-stock-high" th:text="${p.stock}"></span>
                            <span th:if="${p.stock > 0 and p.stock <= 10}" class="badge badge-stock-low" th:text="${p.stock}"></span>
                            <span th:if="${p.stock == 0}" class="badge badge-stock-out">품절</span>
                        </td>
                        <td class="text-center text-muted small"
                            th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}"></td>
                        <td class="text-center" sec:authorize="hasRole('ADMIN')">
                            <div class="d-flex justify-content-center gap-1">
                                <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-outline-primary btn-sm">수정</a>
                                <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" onsubmit="return confirm('삭제하시겠습니까?')">
                                    <button class="btn btn-outline-danger btn-sm">삭제</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <nav th:if="${productPage.totalPages > 0}" class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${productPage.number - 1}, keyword=${keyword})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                th:classappend="${productPage.number == i} ? 'active'">
                <a class="page-link" th:href="@{/products(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${productPage.number + 1}, keyword=${keyword})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
<footer style="text-align: center; color: #666; padding: 20px;">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371488 | 성명: 송지원'}"></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

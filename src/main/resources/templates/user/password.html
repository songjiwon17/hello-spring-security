<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 500px; margin-top: 50px;">
    <h4 class="fw-bold mb-4 border-start border-4 border-primary ps-2">비밀번호 변경</h4>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">현재 비밀번호</label>
                    <input type="password" class="form-control" th:field="*{currentPassword}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{currentPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">새 비밀번호</label>
                    <input type="password" class="form-control" th:field="*{newPassword}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">새 비밀번호 확인</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}" th:errorclass="is-invalid">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold">비밀번호 변경</button>
            </form>
        </div>
    </div>
</div>

<hr class="mt-5">
<footer style="text-align: center; color: #666; padding: 20px;">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371488 | 성명: 송지원'}"></p>
</footer>

</body>
</html>

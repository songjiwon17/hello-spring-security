<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 권한 없음 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container text-center" style="margin-top: 100px; margin-bottom: 100px;">
    <h1 class="display-1 fw-bold text-danger">403</h1>
    <h3 class="mb-4">Access Denied</h3>
    <p class="lead text-muted mb-5">관리자(ADMIN) 권한이 필요합니다.<br>일반 유저는 이 페이지에 접근할 수 없습니다.</p>
    <a th:href="@{/products}" class="btn btn-primary px-4 py-2">상품 목록으로 돌아가기</a>
</div>

<hr class="mt-5">
<footer style="text-align: center; color: #666; padding: 20px;">
    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371488 | 성명: 송지원'}"></p>
</footer>

</body>
</html>
